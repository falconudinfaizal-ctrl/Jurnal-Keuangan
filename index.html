<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Jurnal Harian</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 400px; margin: auto; background-color: #f4f4f9; }
        .form-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 15px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px;}
        button { background-color: #28a745; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Catat Transaksi</h2>
    <form id="formKeuangan">
        <label>Tanggal Transaksi:</label>
        <input type="date" name="tanggal" required>

        <label>Jenis Transaksi:</label>
        <select name="jenis" id="jenis" required>
            <option value="">-- Pilih Jenis --</option>
            <option value="Pemasukan">Pemasukan</option>
            <option value="Pengeluaran">Pengeluaran</option>
        </select>

        <label>Kategori:</label>
        <select name="kategori" id="kategori" required>
            <option value="">-- Pilih Jenis Transaksi Dulu --</option>
        </select>

        <label>Sumber / Posisi Harta Lancar:</label>
        <select name="sumber" required>
            <option value="Kas Tunai">Kas Tunai</option>
            <option value="Rekening Bank">Rekening Bank</option>
            <option value="e-Wallet">e-Wallet</option>
        </select>

        <label>Keterangan Detail:</label>
        <input type="text" name="keterangan" placeholder="Contoh: Beli mentega, terima dana proyek..." required>

        <label>Nominal (Rp):</label>
        <input type="number" name="nominal" required>

        <button type="submit" id="btnSubmit">Kirim Data</button>
    </form>
</div>

<script>
    // 1. LOGIKA UNTUK MENU KATEGORI DINAMIS
    const jenisSelect = document.getElementById('jenis');
    const kategoriSelect = document.getElementById('kategori');
    
    const opsiPemasukan = ['Uang Saku', 'Hasil Penjualan', 'Dana Proyek', 'Lain-lain'];
    const opsiPengeluaran = ['Bahan Baku', 'Perlengkapan Produksi', 'Transportasi', 'Konsumsi Pribadi', 'Lain-lain'];

    jenisSelect.addEventListener('change', function() {
        kategoriSelect.innerHTML = ''; // Kosongkan pilihan sebelumnya
        let pilihan = this.value === 'Pemasukan' ? opsiPemasukan : opsiPengeluaran;
        
        pilihan.forEach(opsi => {
            let elemenBaru = document.createElement('option');
            elemenBaru.value = opsi;
            elemenBaru.text = opsi;
            kategoriSelect.appendChild(elemenBaru);
        });
    });

    // 2. LOGIKA MENGIRIM DATA KE SPREADSHEET
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyKdrwgYJPRa9KiE3ZM9ijFIjbMWOFJ3CEGT3cbuFVv5zLXiGgNphdApP3B5ObjDNoP/exec';
    const form = document.getElementById('formKeuangan');
    const btnSubmit = document.getElementById('btnSubmit');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btnSubmit.innerHTML = 'Memproses...';

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                alert('Jurnal berhasil dicatat!');
                form.reset();
                kategoriSelect.innerHTML = '<option value="">-- Pilih Jenis Transaksi Dulu --</option>';
                btnSubmit.innerHTML = 'Kirim Data';
            })
            .catch(error => {
                alert('Gagal mengirim data.');
                btnSubmit.innerHTML = 'Kirim Data';
            });
    });
</script>

</body>
</html>
